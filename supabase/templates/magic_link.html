<!doctype html>
<html lang="en">
  <body
    style="
      font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, sans-serif;
      line-height: 1.5;
      color: #1a1a1a;
    "
  >
    <h2>Sign in to 10xPlantsInventory</h2>
    <p>Click the button below to finish signing in. This link can only be used once and expires shortly.</p>
    <p>
      <a
        href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email&next=/dashboard"
        style="
          display: inline-block;
          padding: 12px 20px;
          background: #16a34a;
          color: #ffffff;
          text-decoration: none;
          border-radius: 6px;
        "
        >Sign in</a
      >
    </p>
    <p style="color: #6b7280; font-size: 14px">If you didn't request this email, you can safely ignore it.</p>
  </body>
</html>
